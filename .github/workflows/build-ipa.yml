name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Setup Capacitor
        run: |
          npx cap sync ios

      - name: Build iOS App
        run: |
          # Use xcodebuild to build the app
          # We build for 'generic/platform=iOS' to create a distributable binary
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -destination 'generic/platform=iOS' \
                     archive -archivePath build/App.xcarchive \
                     CODE_SIGNING_ALLOWED=NO

      - name: Create Unsigned IPA
        run: |
          # Create the Payload folder for the IPA
          mkdir -p build/Payload
          cp -r build/App.xcarchive/Products/Applications/App.app build/Payload/
          cd build && zip -r FullLoopReport.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FullLoopReport-IPA
          path: build/FullLoopReport.ipa
          retention-days: 7
